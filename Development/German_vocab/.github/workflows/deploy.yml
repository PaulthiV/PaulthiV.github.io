name: Deploy to GitHub Pages

on:
  push:
    branches: [gh-pages]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Development/German_vocab
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Generate vocab manifest
        run: node scripts/generate-vocab-manifest.cjs
      - run: npm run build
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Development/German_vocab/dist
          destination_dir: German_vocab
